services:
  - type: web
    name: yabatech-hostel
    runtime: node
    plan: free
    repo: https://github.com/YOUR_USERNAME/yabatech-hostel
    buildCommand: cd backend && npm install
    startCommand: cd backend && node setup.js && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@yabatechhostel.edu.ng
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DB_PATH
        value: ./database/hostel.db
